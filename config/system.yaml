# ==============================================================================
# TradeCouncil 技術設定(system.yaml)
#
# ここに書けるのは「技術設定」のみ。運用ポリシー(リスク上限・レバレッジ・
# ゲート基準など決裁事項)は config/policies/ のポリシーレジストリで管理し、
# このファイルに書いてはならない(不変条項5: No Policy, No Trade)。
# ==============================================================================

db:
  # プロジェクトルートからの相対パス
  path: var/tradecouncil.db

runtime:
  kill_flag: var/run/KILL
  log_dir: var/logs
  heartbeat_interval_sec: 30
  watchdog_stale_sec: 120
  log_format: plain        # plain(人間可読)| json(CloudWatch Logs 取り込み用。AWS では json — ADR-0006)
  log_level: info

paper:
  # ペーパー約定モデル(執行シミュレーションの技術パラメータ)
  fee_bps: 10          # 手数料 0.10%
  slippage_bps: 5      # スリッページ 0.05%
  initial_balance_jpy: 1000000   # ペーパー口座の初期残高(仮想資金)

feed:
  # ダミーBOT用価格フィード: random_walk | public_rest(Phase 1 で実装予定)
  type: random_walk
  random_walk:
    start_price: 10000000   # BTC/JPY 想定の開始価格
    drift_bps_per_bar: 0
    vol_bps_per_bar: 20     # 1バーあたり標準偏差 0.2%
    bar_interval_sec: 60
    seed: null              # null = 起動毎にランダム / テストでは固定する

notify:
  # 通知先 URL は .env から読む。ここに書かない。
  # チャネル別 URL は TEAMS_WORKFLOW_URL_<チャネル名大文字>(例 _OPS / _ALERTS)。
  # 未設定チャネルは TEAMS_WORKFLOW_URL(default)へフォールバック(ADR-0003)
  backend: teams            # teams(Power Automate Workflows + Adaptive Card)| discord
  min_severity: info        # info | warning | critical
  routing:                  # severity → チャネル名(未記載の severity は default URL へ)
    info: ops
    warning: alerts
    critical: alerts
  # governance / reports チャネルは routing に載せず、発火側が channel= で明示指定する
